<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ get_text('register') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
</head>

<body>
    <div class="container">
        <div class="nav">
            <div style="font-weight: 800;"><a href="{{ url_for('home') }}"
                    style="border:none; padding:0; background:none; color:inherit;">CropSync</a></div>
            <div class="nav-links">
                <button id="theme-toggle" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">🌓
                    Theme</button>
                <a href="{{ url_for('login') }}">{{ get_text('login') }}</a>
            </div>
        </div>

        <div style="max-width: 450px; margin: 4rem auto; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 2rem;">🔒</div>
            <h2>{{ get_text('create_account') }}</h2>
            <p style="margin: 2rem 0; font-size: 1.1rem; line-height: 1.6;">
                Self-registration is currently disabled for this demo.<br>
                Please use the pre-defined accounts available on the login page.
            </p>
            <a href="{{ url_for('login') }}" class="btn" style="width: 100%; border-color: var(--text-color); background: var(--text-color); color: var(--bg-color);">
                Go to Login Page
            </a>
        </div>

        <script>
            document.getElementById('theme-toggle').addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        </script>
    </div>
</body>

</html>
